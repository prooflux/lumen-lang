name: gate

# The single required check for Lumen. Runs the same correctness gates a developer runs
# locally: the seed conformance/safety/loop suite and the native bit-identity gates
# (optimizer, C emitter, per-function emitter, float/array/record). All are deterministic;
# they fail only on a correctness regression, never on timing. The rate gate
# (native_bench.mjs) is intentionally excluded here — it is a local Law-P perf check, not a
# CI gate, because shared runners make wall-clock comparisons flaky. macos-latest is arm64
# with Apple clang, matching the development machine so float bit-identity holds exactly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger: auto-merge.yml squash-merges with GITHUB_TOKEN, and bot-token pushes do
  # NOT re-trigger workflows, so main's HEAD can end up with no gate run of its own (the last
  # push-gate stays pinned to an older commit). workflow_dispatch lets us force a fresh run on
  # main HEAD to reflect true status. Run: gh workflow run gate.yml --ref main
  workflow_dispatch:

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: scoreboard gate (bench/scoreboard.json schema, evidence, flip-coupling)
        working-directory: .
        run: |
          # Zero npm dependencies, so this runs first for fast feedback before the expensive
          # seed/native installs below. actions/checkout@v4 is shallow by default; the script's
          # own `git fetch origin main --depth=1` (tolerated if it fails) is what makes
          # flip-coupling work despite that, per tools/scoreboard_gate.mjs's own comments.
          node tools/scoreboard_gate_test.mjs && node tools/scoreboard_gate.mjs --check
      - name: seed gates (conformance + safety + loop + cache)
        working-directory: seed
        run: |
          npm install
          # loop_test.mjs exercises the MCP full-compiler-access tools (lumen_emit_c /
          # lumen_emit_llvm / lumen_optimize), which import native/pipeline.mjs; that resolves
          # `wabt` from native/node_modules, so the native deps must be present first.
          (cd ../native && npm install)
          npm test
          # C0: capability-purity ratchet (seed/effects.mjs). effects_test.mjs already ran as
          # part of `npm test` above; this runs the gate's own pure-function test then the gate
          # itself (BLOCKING: soundness cross-check, named finance-kernel purity, purity-fraction
          # ratchet vs docs/EFFECTS_BASELINE.json), mirroring scoreboard_gate's test-then-check pairing.
          node ../tools/effects_gate_test.mjs && node ../tools/effects_gate.mjs
      - name: native gates (bit-identity vs the interpreter oracle)
        working-directory: native
        run: |
          npm install
          node optimize_diff.mjs
          node native_diff.mjs
          node rawmem_diff.mjs
          node native_fn_test.mjs
          node native_float_test.mjs
          node native_decimal_test.mjs
          node llvm_diff.mjs
          node llvm_float_test.mjs
          node llvm_decimal_test.mjs
          node standalone_diff.mjs
          node heapcap_test.mjs
          node fixpoint_emit_test.mjs
          node native_compile_test.mjs
          node native_pipeline_test.mjs
          node native_fixpoint_test.mjs
          node bootstrap_test.mjs
          node emitter_bootstrap_test.mjs
          node parity_corpus_test.mjs
          node arm64_spike_check.mjs
          node state_eventlog_test.mjs
          node analytics_events_test.mjs
          node native_handlers_test.mjs
          node native_socket_test.mjs
          node fuel_test.mjs
          node tenant_routing_test.mjs
          node http_parse_test.mjs
          node http_headers_test.mjs
          node http_response_test.mjs
          node url_decode_test.mjs
          node http_chunked_test.mjs
          node http_request_body_test.mjs
          node http_router_test.mjs
          node query_parse_test.mjs
          node http_status_line_test.mjs
          node hex_encode_test.mjs
          node hex_decode_test.mjs
          node int_parse_test.mjs
          node trim_test.mjs
          node to_lower_test.mjs
          node http_keepalive_test.mjs
          node content_type_value_test.mjs
          node http_serve_test.mjs
          node lumen_serve_native.mjs --selftest
      - name: promptgreen rig selftest
        working-directory: .
        run: |
          node bench/promptgreen/selftest.mjs
